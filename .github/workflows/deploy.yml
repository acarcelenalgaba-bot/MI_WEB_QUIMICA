name: Deploy MkDocs con PDFs por Tema

on:
  push:
    branches:
      - main # Cambia a master si tu rama principal se llama master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias del sistema (Requeridas para WeasyPrint / PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libgdk-pixbuf2.0-dev libffi-dev shared-mime-info

      - name: Instalar MkDocs y Plugins
        run: |
          pip install pip --upgrade
          pip install mkdocs-material
          pip install mkdocs-with-pdf
          # Añade aquí otros complementos si usas extensiones raras de pymdownx que no vengan en material

      - name: Compilar y Desplegar en GitHub Pages
        run: |
          mkdocs gh-deploy --force